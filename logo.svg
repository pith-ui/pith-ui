<svg xmlns="http://www.w3.org/2000/svg" width="680" height="500" viewBox="0 0 680 500">
  <style>
    .wordmark { fill: #2C2C2A; }
    .tagline  { fill: #888780; }
    @media (prefers-color-scheme: dark) {
      .wordmark { fill: #E8E8E4; }
      .tagline  { fill: #9F9F96; }
    }
  </style>
  <defs>
    <linearGradient id="stem-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5DCAA5"/>
      <stop offset="100%" stop-color="#0F6E56"/>
    </linearGradient>
  </defs>

  <!-- Pith cross-section — concentric rings -->
  <circle cx="290" cy="210" r="95" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1.5"/>
  <circle cx="290" cy="210" r="72" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="1"/>
  <circle cx="290" cy="210" r="50" fill="#5DCAA5" stroke="#1D9E75" stroke-width="0.8"/>
  <circle cx="290" cy="210" r="30" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>

  <!-- Radial vascular bundle spokes -->
  <g stroke="#0F6E56" stroke-width="0.8" opacity="0.5">
    <line x1="290" y1="115" x2="290" y2="138"/>
    <line x1="290" y1="282" x2="290" y2="305"/>
    <line x1="195" y1="210" x2="218" y2="210"/>
    <line x1="362" y1="210" x2="385" y2="210"/>
    <line x1="222.8" y1="142.8" x2="239" y2="159"/>
    <line x1="357.2" y1="142.8" x2="341" y2="159"/>
    <line x1="222.8" y1="277.2" x2="239" y2="261"/>
    <line x1="357.2" y1="277.2" x2="341" y2="261"/>
  </g>

  <!-- Parenchyma cell dots -->
  <g fill="#085041" opacity="0.3">
    <!-- Section: top → top-right -->
    <circle cx="306.3" cy="128.1" r="2"/>
    <circle cx="322" cy="132.9" r="2"/>
    <circle cx="336.4" cy="140.6" r="2"/>
    <!-- Section: top-right → right -->
    <circle cx="359.4" cy="163.6" r="2"/>
    <circle cx="367.1" cy="178" r="2"/>
    <circle cx="371.9" cy="193.7" r="2"/>
    <!-- Section: right → bottom-right -->
    <circle cx="371.9" cy="226.3" r="2"/>
    <circle cx="367.1" cy="242" r="2"/>
    <circle cx="359.4" cy="256.4" r="2"/>
    <!-- Section: bottom-right → bottom -->
    <circle cx="336.4" cy="279.4" r="2"/>
    <circle cx="322" cy="287.1" r="2"/>
    <circle cx="306.3" cy="291.9" r="2"/>
    <!-- Section: bottom → bottom-left -->
    <circle cx="273.7" cy="291.9" r="2"/>
    <circle cx="258" cy="287.1" r="2"/>
    <circle cx="243.6" cy="279.4" r="2"/>
    <!-- Section: bottom-left → left -->
    <circle cx="220.6" cy="256.4" r="2"/>
    <circle cx="212.9" cy="242" r="2"/>
    <circle cx="208.1" cy="226.3" r="2"/>
    <!-- Section: left → top-left -->
    <circle cx="208.1" cy="193.7" r="2"/>
    <circle cx="212.9" cy="178" r="2"/>
    <circle cx="220.6" cy="163.6" r="2"/>
    <!-- Section: top-left → top -->
    <circle cx="243.6" cy="140.6" r="2"/>
    <circle cx="258" cy="132.9" r="2"/>
    <circle cx="273.7" cy="128.1" r="2"/>
  </g>

  <!-- Leaf accent -->
  <path d="M370 140 Q420 90 440 110 Q460 130 410 160 Q390 150 370 140Z" fill="#5DCAA5" opacity="0.7"/>
  <path d="M370 140 Q408 128 440 110" fill="none" stroke="#1D9E75" stroke-width="0.6" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="290" y="390" text-anchor="middle" font-family="'DM Sans', 'Outfit', 'Inter', sans-serif" font-size="48" font-weight="500" class="wordmark" letter-spacing="-1.5">pith<tspan fill="#1D9E75">-ui</tspan></text>

  <!-- Tagline -->
  <text x="290" y="420" text-anchor="middle" font-family="'DM Sans', 'Outfit', 'Inter', sans-serif" font-size="13" font-weight="400" class="tagline" letter-spacing="3">THE CORE OF YOUR INTERFACE</text>
</svg>