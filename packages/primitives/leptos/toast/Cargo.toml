[package]
name = "radix-leptos-toast"
description = "Leptos port of Radix Toast."
homepage = "https://radix.rustforweb.org/primitives/components/toast.html"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
version.workspace = true

[dependencies]
leptos.workspace = true
leptos-node-ref.workspace = true
radix-leptos-collection.workspace = true
radix-leptos-compose-refs.workspace = true
radix-leptos-dismissable-layer.workspace = true
radix-leptos-portal.workspace = true
radix-leptos-presence.workspace = true
radix-leptos-primitive.workspace = true
radix-leptos-use-controllable-state.workspace = true
radix-leptos-visually-hidden.workspace = true
js-sys = "0.3"
send_wrapper.workspace = true
wasm-bindgen = "0.2"
web-sys = { workspace = true, features = [
    "CssStyleDeclaration",
    "CustomEvent",
    "CustomEventInit",
    "Document",
    "DomTokenList",
    "FocusEvent",
    "HtmlElement",
    "HtmlInputElement",
    "KeyboardEvent",
    "Node",
    "NodeFilter",
    "NodeList",
    "PointerEvent",
    "Selection",
    "TreeWalker",
    "Window",
] }
