[package]
name = "radix-leptos-context-menu"
description = "Leptos port of Radix Context Menu."
homepage = "https://radix.rustforweb.org/primitives/components/context-menu.html"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
version.workspace = true

[dependencies]
leptos.workspace = true
leptos-node-ref.workspace = true
radix-leptos-compose-refs.workspace = true
radix-leptos-menu.workspace = true
radix-leptos-primitive.workspace = true
radix-leptos-use-controllable-state.workspace = true
send_wrapper.workspace = true
wasm-bindgen = "0.2"
web-sys = { workspace = true, features = [
    "CustomEvent",
    "DomRect",
    "HtmlElement",
    "PointerEvent",
] }
