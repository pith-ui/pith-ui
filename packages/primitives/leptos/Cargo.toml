[package]
name = "pith-ui"
description = "Leptos port of Radix Primitives - accessible, unstyled UI components."

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
version.workspace = true

[features]
default = []
all = [
    "accessible-icon",
    "accordion",
    "alert-dialog",
    "aspect-ratio",
    "avatar",
    "calendar",
    "checkbox",
    "collapsible",
    "colors",
    "combobox",
    "context-menu",
    "dialog",
    "dropdown-menu",
    "form",
    "hover-card",
    "icons",
    "label",
    "menu",
    "menubar",
    "navigation-menu",
    "one-time-password-field",
    "password-toggle-field",
    "popover",
    "progress",
    "radio-group",
    "scroll-area",
    "select",
    "separator",
    "slider",
    "switch",
    "tabs",
    "toast",
    "toggle",
    "toggle-group",
    "toolbar",
    "tooltip",
]

# Component-to-component dependencies
accordion = ["collapsible"]
alert-dialog = ["dialog"]
context-menu = ["menu"]
dropdown-menu = ["menu"]
form = ["label"]
menubar = ["menu"]
toolbar = ["separator", "toggle-group"]

# Non-component features
colors = []
icons = []
internals = []

# Leaf features (no component deps)
accessible-icon = []
calendar = ["chrono"]
aspect-ratio = []
avatar = []
checkbox = []
collapsible = []
combobox = []
dialog = []
hover-card = []
label = []
menu = []
navigation-menu = []
one-time-password-field = []
password-toggle-field = []
popover = []
progress = []
radio-group = []
scroll-area = []
select = []
separator = []
slider = []
switch = []
tabs = []
toast = []
toggle = []
toggle-group = []
tooltip = []

[dependencies]
chrono = { version = "0.4", features = ["wasmbind"], optional = true }
floating-ui-leptos = "0.6.0"
getrandom = { version = "0.2", features = ["js"] }
js-sys = "0.3"
leptos.workspace = true
leptos-maybe-callback.workspace = true
leptos-node-ref.workspace = true
leptos_dom.workspace = true
nanoid = "0.4.0"
once_cell = "1.19.0"
send_wrapper.workspace = true
serde.workspace = true
serde_json.workspace = true
wasm-bindgen = "0.2"

[dependencies.web-sys]
workspace = true
features = [
    "AddEventListenerOptions",
    "Attr",
    "ClipboardEvent",
    "CssStyleDeclaration",
    "CustomEvent",
    "CustomEventInit",
    "DataTransfer",
    "Document",
    "DomRect",
    "DomTokenList",
    "Element",
    "Event",
    "EventInit",
    "EventListenerOptions",
    "EventTarget",
    "FocusEvent",
    "FocusOptions",
    "FormData",
    "HtmlButtonElement",
    "HtmlCollection",
    "HtmlElement",
    "HtmlFormElement",
    "HtmlIFrameElement",
    "HtmlInputElement",
    "HtmlSelectElement",
    "HtmlStyleElement",
    "HtmlTextAreaElement",
    "InputEvent",
    "KeyboardEvent",
    "MutationObserver",
    "MutationObserverInit",
    "MutationRecord",
    "NamedNodeMap",
    "Node",
    "NodeFilter",
    "NodeList",
    "PointerEvent",
    "ResizeObserver",
    "ResizeObserverBoxOptions",
    "ResizeObserverEntry",
    "ResizeObserverOptions",
    "ResizeObserverSize",
    "ScrollIntoViewOptions",
    "ScrollLogicalPosition",
    "Selection",
    "TreeWalker",
    "ValidityState",
    "WheelEvent",
    "Window",
]

[dev-dependencies]
any_spawner = "0.3.0"
wasm-bindgen = "0.2.114"
wasm-bindgen-test = "0.3"
